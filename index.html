<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志愿活动管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            background: white;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .error-message {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>志愿活动管理系统</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="role">身份</label>
                <select id="role" name="role" required>
                    <option value="admin">管理员</option>
                    <option value="leader">负责人</option>
                    <option value="member">普通成员</option>
                </select>
            </div>
            <button type="submit" class="btn">登录</button>
            <div id="error-message" class="error-message"></div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化默认用户数据
            initDefaultUsers();

            const loginForm = document.getElementById('login-form');
            const errorMessage = document.getElementById('error-message');

            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const role = document.getElementById('role').value;

                if (validateLogin(username, password, role)) {
                    // 保存登录状态
                    localStorage.setItem('user', JSON.stringify({ username, role }));
                    // 跳转到对应页面
                    switch (role) {
                        case 'admin':
                            window.location.href = 'admin.html';
                            break;
                        case 'leader':
                            window.location.href = 'leader.html';
                            break;
                        case 'member':
                            window.location.href = 'member.html';
                            break;
                    }
                } else {
                    errorMessage.textContent = '用户名或密码错误';
                }
            });
        });

        function initDefaultUsers() {
            const users = {
                admin: {
                    username: 'admin',
                    password: 'admin123',
                    role: 'admin'
                },
                leader1: {
                    username: 'leader',
                    password: 'leader123',
                    role: 'leader'
                },
                member1: {
                    username: 'member',
                    password: 'member123',
                    role: 'member'
                }
            };

            localStorage.setItem('users', JSON.stringify(users));

            // 初始化成员数据
            const members = [
                { id: 1, name: '张三', role: 'member' },
                { id: 2, name: '李四', role: 'member' },
                { id: 3, name: '王五', role: 'member' },
                { id: 4, name: '赵六', role: 'member' }
            ];

            localStorage.setItem('members', JSON.stringify(members));

            // 初始化考勤数据
            localStorage.setItem('attendance', JSON.stringify([]));
        }

        function validateLogin(username, password, role) {
            const users = JSON.parse(localStorage.getItem('users') || '{}');

            for (const key in users) {
                const user = users[key];
                if (user.username === username && user.password === password && user.role === role) {
                    return true;
                }
            }

            return false;
        }
    </script>
</body>
</html>
